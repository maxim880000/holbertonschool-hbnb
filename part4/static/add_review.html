<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Add Review</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="HBnB Logo" class="logo">
        <nav>
            <a href="index.html">Places</a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </nav>
    </header>

    <main>
        <section class="add-review">
            <form id="review-form" class="form">
                <h2>Add a Review</h2>

                <label for="review">Your Review:</label>
                <textarea id="review" name="review" rows="5" required></textarea>

                <label for="rating">Rating:</label>
                <select id="rating" name="rating" required>
                    <option value="1">&#9733; 1</option>
                    <option value="2">&#9733;&#9733; 2</option>
                    <option value="3">&#9733;&#9733;&#9733; 3</option>
                    <option value="4">&#9733;&#9733;&#9733;&#9733; 4</option>
                    <option value="5" selected>&#9733;&#9733;&#9733;&#9733;&#9733; 5</option>
                </select>

                <button type="submit">Submit Review</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
