<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Add a Review</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/icon.svg" type="image/svg+xml">
</head>
<body>
    <header>
        <img src="images/logo.svg" alt="HBnB Logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" class="login-button" id="login-link">Login</a>
        </nav>
    </header>

    <main>
        <a href="#" class="back-link" id="back-to-place">&#8592; Back to place</a>

        <div class="form-container add-review">
            <h2>Add a Review</h2>
            <div id="review-message" class="message"></div>
            <form id="review-form" novalidate>
                <div class="form-group">
                    <label for="review-text">Your Review</label>
                    <textarea
                        id="review-text"
                        name="review-text"
                        placeholder="Share your experience..."
                        required
                        rows="5"
                    ></textarea>
                </div>
                <div class="form-group">
                    <label for="rating">Rating</label>
                    <select id="rating" name="rating" required>
                        <option value="">Select a rating</option>
                        <option value="1">&#9733; 1 - Poor</option>
                        <option value="2">&#9733;&#9733; 2 - Fair</option>
                        <option value="3">&#9733;&#9733;&#9733; 3 - Good</option>
                        <option value="4">&#9733;&#9733;&#9733;&#9733; 4 - Very Good</option>
                        <option value="5">&#9733;&#9733;&#9733;&#9733;&#9733; 5 - Excellent</option>
                    </select>
                </div>
                <button type="submit" class="submit-button">Submit Review</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
